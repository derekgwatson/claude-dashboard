<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <title>Claude Dashboard</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="main">
        <div id="sessions-container"></div>
        <div id="remote-section"></div>
        <div class="statusbar">
            <div class="status-legend">
                <div><span class="legend-dot" style="background:#58a6ff"></span>Working</div>
                <div><span class="legend-dot" style="background:#d29922"></span>Waiting for input</div>
                <div><span class="legend-dot" style="background:#f85149"></span>Needs permission</div>
                <div><span class="legend-dot" style="background:#3fb950"></span>Done</div>
            </div>
            <div id="sync-status"></div>
        </div>
        <div id="empty-state">
            <p>No sessions yet</p>
            <p class="hint">Sessions appear automatically when Claude Code fires a hook</p>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/sw.js");
        }
    </script>
</body>
</html>
