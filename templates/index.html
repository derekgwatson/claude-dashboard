<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <title>Claude Dashboard</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="main">
        <div id="sessions-container"></div>
        <div id="remote-section"></div>
        <div class="statusbar">
            <div class="status-legend">
                <div><span class="legend-dot" style="background:#58a6ff"></span>Working</div>
                <div><span class="legend-dot" style="background:#d29922"></span>Waiting for input</div>
                <div><span class="legend-dot" style="background:#f85149"></span>Needs permission</div>
                <div><span class="legend-dot" style="background:#3fb950"></span>Done</div>
            </div>
            <button id="push-toggle" class="push-btn" title="Enable push notifications" style="display:none">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2zM8 1.5A3.5 3.5 0 0 0 4.5 5c0 .7-.2 2.1-.7 3.4-.3.8-.7 1.5-1.1 2.1H13.3c-.4-.6-.8-1.3-1.1-2.1C11.7 7.1 11.5 5.7 11.5 5A3.5 3.5 0 0 0 8 1.5z"/>
                </svg>
            </button>
            <div id="sync-status"></div>
        </div>
        <div id="empty-state">
            <p>No sessions yet</p>
            <p class="hint">Sessions appear automatically when Claude Code fires a hook</p>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/sw.js");
        }
    </script>
</body>
</html>
