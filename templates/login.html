<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <title>Claude Dashboard — Login</title>
    <link rel="icon" href="/static/icon-192.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 32px;
            width: 320px;
        }
        h1 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 0.95rem;
            margin-bottom: 16px;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #58a6ff;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #238636;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #2ea043; }
        .error {
            color: #f85149;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <form class="login-box" method="POST" action="/login">
        <h1>Claude Dashboard</h1>
        {% if error %}<div class="error">Incorrect password</div>{% endif %}
        <input type="password" name="password" placeholder="Password" autofocus>
        <button type="submit">Sign in</button>
    </form>
</body>
</html>
